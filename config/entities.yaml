# Enum values confirmed from opsera_uat exploration
ides:
  - vscode
  - intellij
  - visualstudio
  - eclipse
  - xcode

features:
  - code_completion
  - chat_panel_ask_mode
  - chat_panel_edit_mode
  - agent_edit
  - chat_inline
  - chat_panel_agent_mode
  - chat_panel_custom_mode
  - chat_panel_unknown_mode

