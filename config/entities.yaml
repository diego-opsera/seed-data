# Fake demo enterprise — safe to insert/delete in any environment
enterprise:
  id: 999999
  name: "demo-acme-corp"

orgs:
  - id: 9990001
    name: "demo-acme-engineering"     # core batch (stable)
  - id: 9990002
    name: "demo-acme-direct"          # direct batch (safe to wipe during testing)

teams:
  - name: "demo-backend"
    slug: "demo-backend"
    org_name: "demo-acme-engineering"
  - name: "demo-frontend"
